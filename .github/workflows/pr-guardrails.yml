name: PR Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Block local state and generated dependencies
        run: node scripts/check-repo-guardrails.mjs
