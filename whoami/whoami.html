<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.5; }
h1 { text-align: center; margin-bottom: 20px; font-weight: 800; color: #f8fafc; letter-spacing: -0.025em; }
.controls { max-width: 1000px; margin: 0 auto 20px auto; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
button.action { padding: 10px 18px; border: none; border-radius: 8px; background: #334155; color: #f8fafc; cursor: pointer; font-weight: 600; transition: all 0.2s; border: 1px solid #475569; }
button.action:hover { background: #475569; transform: translateY(-1px); }
button.action.primary { background: #3b82f6; border-color: #2563eb; }
button.action.primary:hover { background: #2563eb; }

.container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
@media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

.sidebar { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155; height: fit-content; }
.tab-btn { display: block; width: 100%; text-align: left; padding: 10px 15px; border-radius: 8px; border: none; background: transparent; color: #94a3b8; cursor: pointer; margin-bottom: 5px; font-weight: 500; transition: all 0.2s; }
.tab-btn:hover { background: #334155; color: #f8fafc; }
.tab-btn.active { background: #3b82f6; color: #fff; }

.main-content { background: #1e293b; border-radius: 12px; padding: 25px; border: 1px solid #334155; min-height: 600px; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

.kv { display: grid; grid-template-columns: 200px 1fr; gap: 12px 20px; margin-bottom: 10px; }
.kv div:first-child { color: #94a3b8; font-weight: 500; }
.kv div:last-child { color: #f8fafc; word-break: break-all; }

#map { height: 350px; border-radius: 12px; border: 1px solid #334155; margin-top: 20px; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-left: 5px; }
.ok { background: #065f46; color: #34d399; }
.warn { background: #78350f; color: #fbbf24; }
.err { background: #7f1d1d; color: #f87171; }
hr { border: none; border-top: 1px solid #334155; margin: 20px 0; }
pre { background: #0f172a; padding: 15px; border-radius: 8px; color: #38bdf8; font-size: 12px; overflow-x: auto; }
</style>
</head>
<body>
<h1>Identity Disclosure Dashboard</h1>

<div class="controls">
  <button id="permAllBtn" class="action primary">Request All Permissions</button>
  <button id="geoBtn" class="action">Precise GPS</button>
  <button id="copyBtn" class="action">Copy JSON</button>
  <button id="downloadBtn" class="action">Export Report</button>
</div>

<div class="container">
  <div class="sidebar">
    <button class="tab-btn active" data-tab="overview">General Overview</button>
    <button class="tab-btn" data-tab="system">Browser & OS</button>
    <button class="tab-btn" data-tab="hardware">Hardware & GPU</button>
    <button class="tab-btn" data-tab="network">Network & IP</button>
    <button class="tab-btn" data-tab="media">Media & Devices</button>
    <button class="tab-btn" data-tab="location">Location & Sensors</button>
    <button class="tab-btn" data-tab="security">Security & Privacy</button>
    <button class="tab-btn" data-tab="raw">Raw JSON</button>
  </div>
  
  <div class="main-content" id="reportUI">
    <div id="overview" class="tab-content active">Loading...</div>
    <div id="system" class="tab-content"></div>
    <div id="hardware" class="tab-content"></div>
    <div id="network" class="tab-content"></div>
    <div id="media" class="tab-content"></div>
    <div id="location" class="tab-content">
      <div id="locationData"></div>
      <div id="map"></div>
    </div>
    <div id="security" class="tab-content"></div>
    <div id="raw" class="tab-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let mapInstance = null;

// Tab Switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    const target = document.getElementById(btn.dataset.tab);
    target.classList.add('active');
    
    // Leaflet needs a resize trigger if it was initialized while hidden
    if (btn.dataset.tab === 'location' && mapInstance) {
      setTimeout(() => mapInstance.invalidateSize(), 100);
    }
  };
});

// Utility
function safeStringify(obj){
  const seen = new WeakSet();
  return JSON.stringify(obj, (k,v)=>{
    if (typeof v === 'bigint') return v.toString();
    if (typeof v === 'object' && v !== null){
      if (seen.has(v)) return '[Circular]';
      seen.add(v);
    }
    return v;
  }, 2);
}

async function getPermission(name, opts){
  if (!navigator.permissions || !navigator.permissions.query) return {state:'unsupported'};
  try { const res = await navigator.permissions.query(Object.assign({name}, opts||{})); return {state: res.state}; } catch(e){ return {state:'error'}; }
}

// Data Gathering
async function collectData() {
  const data = {};
  
  // Basic
  data.time = {
    now: new Date().toISOString(),
    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    offset: new Date().getTimezoneOffset(),
    locale: navigator.language
  };

  // Browser
  data.browser = {
    ua: navigator.userAgent,
    platform: navigator.platform,
    vendor: navigator.vendor,
    cookies: navigator.cookieEnabled,
    doNotTrack: navigator.doNotTrack,
    pdfViewer: navigator.pdfViewerEnabled,
    webdriver: navigator.webdriver
  };
  
  // Hardware
  data.hardware = {
    cores: navigator.hardwareConcurrency,
    memory: navigator.deviceMemory,
    maxTouchPoints: navigator.maxTouchPoints,
    bluetooth: 'bluetooth' in navigator,
    usb: 'usb' in navigator,
    hid: 'hid' in navigator,
    serial: 'serial' in navigator
  };

  // Display
  data.display = {
    width: window.screen.width,
    height: window.screen.height,
    colorDepth: window.screen.colorDepth,
    pixelRatio: window.devicePixelRatio,
    gamut: window.matchMedia('(color-gamut: p3)').matches ? 'p3' : window.matchMedia('(color-gamut: srgb)').matches ? 'srgb' : 'rec2020'
  };

  // Network (Best effort IP leak)
  data.network = {
    online: navigator.onLine,
    type: navigator.connection?.effectiveType,
    downlink: navigator.connection?.downlink,
    rtt: navigator.connection?.rtt,
    saveData: navigator.connection?.saveData
  };

  try {
    const ipResp = await fetch('https://ipapi.co/json/');
    data.ip = await ipResp.json();
  } catch(e) { data.ip = 'blocked'; }

  // GPU
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl');
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    data.gpu = {
      vendor: gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL),
      renderer: gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL)
    };
  } catch(e) { data.gpu = 'unsupported'; }

  // Permissions
  const perms = ['geolocation','camera','microphone','notifications','clipboard-read','midi','accelerometer','gyroscope','magnetometer'];
  data.permissions = {};
  for(let p of perms) {
    data.permissions[p] = (await getPermission(p)).state;
  }

  renderData(data);
  return data;
}

function badge(state){
  const cls = state==='granted' ? 'ok' : state==='denied' ? 'err' : 'warn';
  return `<span class="badge ${cls}">${state}</span>`;
}

function renderData(d) {
  document.getElementById('overview').innerHTML = `
    <div class="kv"><div>Primary IP</div><div>${d.ip?.ip || 'Unknown'}</div></div>
    <div class="kv"><div>ISP</div><div>${d.ip?.org || 'Unknown'}</div></div>
    <div class="kv"><div>Location</div><div>${d.ip?.city}, ${d.ip?.country_name}</div></div>
    <div class="kv"><div>Browser</div><div>${d.browser.platform}</div></div>
    <div class="kv"><div>Timezone</div><div>${d.time.timezone}</div></div>
    <hr/>
    <h3>Active Permissions</h3>
    <div class="kv"><div>Geolocation</div><div>${badge(d.permissions.geolocation)}</div></div>
    <div class="kv"><div>Camera</div><div>${badge(d.permissions.camera)}</div></div>
    <div class="kv"><div>Microphone</div><div>${badge(d.permissions.microphone)}</div></div>
  `;

  document.getElementById('locationData').innerHTML = `
    <div class="kv"><div>Latitude</div><div>${d.ip?.latitude || 'N/A'}</div></div>
    <div class="kv"><div>Longitude</div><div>${d.ip?.longitude || 'N/A'}</div></div>
    <div class="kv"><div>Accuracy</div><div>${d.ip?.accuracy || 'Low (IP-based)'}</div></div>
    <div class="kv"><div>City</div><div>${d.ip?.city || 'Unknown'}</div></div>
    <div class="kv"><div>Region</div><div>${d.ip?.region || 'Unknown'}</div></div>
  `;

  document.getElementById('system').innerHTML = `
    <div class="kv"><div>User Agent</div><div>${d.browser.ua}</div></div>
    <div class="kv"><div>Platform</div><div>${d.browser.platform}</div></div>
    <div class="kv"><div>Language</div><div>${d.time.locale}</div></div>
    <div class="kv"><div>Cookies</div><div>${d.browser.cookies}</div></div>
    <div class="kv"><div>Webdriver (Bot)</div><div>${d.browser.webdriver}</div></div>
  `;

  document.getElementById('hardware').innerHTML = `
    <div class="kv"><div>CPU Cores</div><div>${d.hardware.cores}</div></div>
    <div class="kv"><div>RAM (Approx)</div><div>${d.hardware.memory} GB</div></div>
    <div class="kv"><div>GPU</div><div>${d.gpu.renderer}</div></div>
    <div class="kv"><div>GPU Vendor</div><div>${d.gpu.vendor}</div></div>
    <hr/>
    <div class="kv"><div>Screen</div><div>${d.display.width}x${d.display.height}</div></div>
    <div class="kv"><div>Color Gamut</div><div>${d.display.gamut}</div></div>
    <hr/>
    <div class="kv"><div>Bluetooth API</div><div>${d.hardware.bluetooth}</div></div>
    <div class="kv"><div>USB API</div><div>${d.hardware.usb}</div></div>
    <div class="kv"><div>HID API</div><div>${d.hardware.hid}</div></div>
  `;

  document.getElementById('raw').innerHTML = `<pre>${safeStringify(d)}</pre>`;
  
  // Map
  if(d.ip?.latitude && d.ip?.longitude) {
    if (mapInstance) {
      mapInstance.remove();
    }
    mapInstance = L.map('map').setView([d.ip.latitude, d.ip.longitude], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
    L.marker([d.ip.latitude, d.ip.longitude]).addTo(mapInstance).bindPopup('Estimated Location');
  }
}

// Action Buttons
document.getElementById('permAllBtn').onclick = async () => {
  try {
    await Notification.requestPermission();
    const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    stream.getTracks().forEach(t => t.stop());
    navigator.geolocation.getCurrentPosition(()=>{});
  } catch(e) {}
  collectData();
};

document.getElementById('geoBtn').onclick = () => {
  navigator.geolocation.getCurrentPosition(p => {
    alert(`Precise: ${p.coords.latitude}, ${p.coords.longitude} (Acc: ${p.coords.accuracy}m)`);
    collectData();
  });
};

document.getElementById('copyBtn').onclick = async () => {
  const d = await collectData();
  await navigator.clipboard.writeText(safeStringify(d));
  alert('Copied to clipboard');
};

collectData();
</script>
</body>
</html>
