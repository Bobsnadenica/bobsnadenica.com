<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Atlas | Tech Knowledge Hub</title>
  <style>
    :root {
      --bg: #0a0d12;
      --surface: #10151d;
      --card: #0d1117;
      --border: rgba(240, 246, 252, 0.12);
      --text: #f0f6fc;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.14);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(88, 166, 255, 0.08), transparent 28%),
        linear-gradient(180deg, #08101a 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    header {
      padding: 3rem 0 2rem;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .breadcrumb a:hover {
      color: var(--accent);
    }

    h1 {
      font-size: clamp(2.1rem, 4vw, 3.6rem);
      letter-spacing: -0.04em;
      margin-bottom: 0.6rem;
      background: linear-gradient(90deg, #fff, #9cd3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
    }

    .tech-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 0 0 1.5rem;
    }

    .tech-tab {
      border: 1px solid var(--border);
      background: rgba(240, 246, 252, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.6rem 0.95rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .tech-tab:hover {
      transform: translateY(-1px);
      border-color: rgba(88, 166, 255, 0.4);
      color: var(--text);
    }

    .tech-tab.active {
      background: var(--accent-soft);
      border-color: rgba(88, 166, 255, 0.5);
      color: #d8ebff;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 1.25rem;
      align-items: start;
    }

    .panel {
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .panel-head {
      padding: 0.95rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .panel-head h2 {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .count {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .command-list {
      max-height: 72vh;
      overflow-y: auto;
    }

    .command-item {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid rgba(240, 246, 252, 0.06);
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 1rem;
      transition: background 0.18s ease;
      display: grid;
      gap: 0.4rem;
    }

    .command-item:hover {
      background: rgba(240, 246, 252, 0.03);
    }

    .command-item.active {
      background: rgba(88, 166, 255, 0.08);
    }

    .command-title {
      font-size: 0.95rem;
      color: var(--text);
    }

    .command-code {
      font-family: var(--font-mono);
      font-size: 0.86rem;
      color: #9cd3ff;
      line-height: 1.5;
      word-break: break-word;
    }

    .output-wrap {
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    .selected-title {
      font-size: 1.05rem;
    }

    .terminal {
      border: 1px solid rgba(240, 246, 252, 0.08);
      border-radius: 14px;
      overflow: hidden;
      background: #05080d;
    }

    .terminal-bar {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid rgba(240, 246, 252, 0.08);
      background: rgba(240, 246, 252, 0.03);
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    pre {
      margin: 0;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .command-preview {
      color: #9cd3ff;
    }

    .output-preview {
      color: #c9d1d9;
      min-height: 420px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .command-list {
        max-height: 42vh;
      }

      .output-preview {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="breadcrumb"><a href="index.html">&larr; Back to Hub</a> / Guides</div>
      <h1>Command Atlas</h1>
      <p class="subtitle">Choose a technology, then click a command to see a simulated output.</p>
    </header>

    <div class="tech-tabs" id="techTabs"></div>

    <main class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2 id="listTitle">Commands</h2>
          <span class="count" id="listCount"></span>
        </div>
        <div class="command-list" id="commandList"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Simulated Output</h2>
        </div>
        <div class="output-wrap">
          <div class="selected-title" id="selectedTitle"></div>
          <div class="terminal">
            <div class="terminal-bar">Command</div>
            <pre class="command-preview" id="selectedCommand"></pre>
          </div>
          <div class="terminal">
            <div class="terminal-bar">Output</div>
            <pre class="output-preview" id="selectedOutput"></pre>
          </div>
        </div>
      </section>
    </main>
  </div>

    const stacks = [...new Set(commands.map((item) => item.stack))];
    let activeStack = stacks[0];
    let activeCommandIndex = 0;

    function getVisibleCommands() {
      return commands.filter((item) => item.stack === activeStack);
    }

    function renderTabs() {
      document.getElementById("techTabs").innerHTML = stacks
        .map((stack) => `
          <button class="tech-tab ${stack === activeStack ? "active" : ""}" type="button" data-stack="${stack}">
            ${stack}
          </button>
        `)
        .join("");
    }

    function renderCommandList() {
      const visible = getVisibleCommands();
      document.getElementById("listTitle").textContent = activeStack;
      document.getElementById("listCount").textContent = `${visible.length} commands`;
      document.getElementById("commandList").innerHTML = visible
        .map((item, index) => `
          <button class="command-item ${index === activeCommandIndex ? "active" : ""}" type="button" data-index="${index}">
            <span class="command-title">${item.title}</span>
            <span class="command-code">${item.command}</span>
          </button>
        `)
        .join("");
    }

    function renderOutput() {
      const selected = getVisibleCommands()[activeCommandIndex];
      if (!selected) {
        document.getElementById("selectedTitle").textContent = "";
        document.getElementById("selectedCommand").textContent = "";
        document.getElementById("selectedOutput").textContent = "";
        return;
      }

      document.getElementById("selectedTitle").textContent = selected.title;
      document.getElementById("selectedCommand").textContent = selected.command;
      document.getElementById("selectedOutput").textContent = selected.output;
    }

    function renderAll() {
      renderTabs();
      renderCommandList();
      renderOutput();
    }

    document.addEventListener("click", (event) => {
      const tab = event.target.closest(".tech-tab");
      if (tab) {
        activeStack = tab.dataset.stack;
        activeCommandIndex = 0;
        renderAll();
        return;
      }

      const commandItem = event.target.closest(".command-item");
      if (commandItem) {
        activeCommandIndex = Number(commandItem.dataset.index);
        renderCommandList();
        renderOutput();
      }
    });

    renderAll();
  </script>
</body>
